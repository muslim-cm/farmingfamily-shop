[build]
  publish = "frontend"

# This ensures /frontend/ paths work
[[redirects]]
  from = "/frontend/*"
  to = "/:splat"
  status = 200

# Root redirect
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

  # Service worker headers - IMPORTANT for updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"